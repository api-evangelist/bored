naftiko: 1.0.0-alpha2
info:
  label: Bored API — Facts
  description: 'Random fact lookup for the Bored API v2 surface. Wraps /api/v2/facts and /api/v2/facts/{key}.'
  tags:
    - Bored
    - Facts
    - Discovery
  created: '2026-05-30'
  modified: '2026-05-30'
binds: []
capability:
  consumes:
    - type: http
      namespace: facts
      baseUri: https://www.boredapi.com
      description: Bored API v2 facts business capability. No authentication required.
      resources:
        - name: api-v2-facts
          path: /api/v2/facts
          operations:
            - name: getRandomFact
              method: GET
              description: Get a random fact.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.fact
        - name: api-v2-facts-key
          path: /api/v2/facts/{key}
          operations:
            - name: getFactByKey
              method: GET
              description: Get a fact by key.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.fact
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
