naftiko: 1.0.0-alpha2
info:
  label: Bored API — Websites
  description: 'Random website recommendations for the Bored API v2 surface. Wraps /api/v2/websites and /api/v2/websites/{key}.'
  tags:
    - Bored
    - Websites
    - Discovery
  created: '2026-05-30'
  modified: '2026-05-30'
binds: []
capability:
  consumes:
    - type: http
      namespace: websites
      baseUri: https://www.boredapi.com
      description: Bored API v2 websites business capability. No authentication required.
      resources:
        - name: api-v2-websites
          path: /api/v2/websites
          operations:
            - name: getRandomWebsite
              method: GET
              description: Get a random website.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.website
        - name: api-v2-websites-key
          path: /api/v2/websites/{key}
          operations:
            - name: getWebsiteByKey
              method: GET
              description: Get a website by key.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.website
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
