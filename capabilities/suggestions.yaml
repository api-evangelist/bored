naftiko: 1.0.0-alpha2
info:
  label: Bored API — Suggestions
  description: 'Submit community suggestions for new activities, facts, riddles, or websites. Wraps POST /api/v2/suggestions. Exactly one of activity/fact/riddle/website must be supplied.'
  tags:
    - Bored
    - Suggestions
    - Submission
  created: '2026-05-30'
  modified: '2026-05-30'
binds: []
capability:
  consumes:
    - type: http
      namespace: suggestions
      baseUri: https://www.boredapi.com
      description: Bored API v2 suggestion submission. No authentication required; moderated before publication.
      resources:
        - name: api-v2-suggestions
          path: /api/v2/suggestions
          operations:
            - name: submitSuggestion
              method: POST
              description: Submit a community content suggestion for moderator review.
              outputRawFormat: json
              outputParameters:
                - name: message
                  type: string
                  value: $.message
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
